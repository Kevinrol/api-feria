          in: path
          required: true
          schema:
            type: integer
        - name: idProyecto
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Relación creada (forma según servicio)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProyectoEstudiante"
    delete:
      tags: [Estudiante]
      summary: Quitar estudiante del proyecto
      operationId: estudianteRemoverProyecto
