openapi: 3.0.3
info:
  title: API Feria
  license:
    name: UNLICENSED
    url: https://unlicense.org/
  description: |
    API REST (NestJS + Prisma) para gestión de carreras, estudiantes, docentes, proyectos,
    jurados, criterios, evaluaciones y relaciones proyecto–estudiante.

    Las fechas almacenadas como `Date` en PostgreSQL se envían/reciben como string ISO 8601
    (típicamente `YYYY-MM-DD` para campos solo-fecha).
  version: "1.0.0"

servers:
  - url: http://localhost:3000
    description: Servidor local (variable de entorno `PORT`, por defecto 3000)

# La API no usa autenticación por ahora; declara explícitamente endpoints públicos.
security: []

tags:
  - name: App
    description: Raíz de la aplicación
  - name: Carrera
    description: Carreras académicas
  - name: Estudiante
    description: Estudiantes y asignación a proyectos
  - name: Docente
    description: Docentes tutores
  - name: Proyecto
    description: Proyectos de feria
  - name: Jurado
    description: Miembros del jurado
  - name: Criterio
    description: Criterios de evaluación
  - name: Evaluacion
    description: Evaluaciones de proyectos por jurado
  - name: DetalleEvaluacion
    description: Puntajes por criterio dentro de una evaluación
  - name: ProyectoEstudiante
    description: Relación N:M proyecto–estudiante
  - name: Usuario
    description: Gestión de credenciales
  - name: Auth
    description: Autenticación JWT

paths:
  /:
    get:
      tags: [App]
      summary: Comprobación de servicio
      operationId: appGetHello
      responses:
        "200":
          description: Texto de bienvenida
          content:
            text/plain:
              schema:
                type: string
                example: Hello World!

  /auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLogin"
      responses:
        "201":
          description: OK (Retorna JWT)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthToken"
        "401":
          description: Credenciales incorrectas

  /carrera:
    get:
      tags: [Carrera]
      summary: Listar carreras
      operationId: carreraFindAll
      responses:
        "200":
          description: Lista (puede incluir `estudiantes` y `proyectos` anidados)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Carrera"
    post:
      tags: [Carrera]
      summary: Crear carrera
      operationId: carreraCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCarrera"
      responses:
        "201":
          description: Carrera creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrera"

  /carrera/{id}:
    get:
      tags: [Carrera]
      summary: Obtener carrera por id
      operationId: carreraFindOne
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Recurso o `null` si no existe
          content:
            application/json:
              schema:
                type: object
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/Carrera"
    patch:
      tags: [Carrera]
      summary: Actualizar carrera
      operationId: carreraUpdate
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCarrera"
      responses:
        "200":
          description: Carrera actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrera"
    delete:
      tags: [Carrera]
      summary: Eliminar carrera
      operationId: carreraRemove
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Registro eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Carrera"

  /carrera/codigo/{codigo}:
    get:
      tags: [Carrera]
      summary: Buscar carrera por código
      operationId: carreraFindByCodigo
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Carrera o `null`
          content:
            application/json:
              schema:
                type: object
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/Carrera"

  /estudiante:
    get:
      tags: [Estudiante]
      summary: Listar estudiantes
      operationId: estudianteFindAll
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Estudiante"
    post:
      tags: [Estudiante]
      summary: Crear estudiante
      operationId: estudianteCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
