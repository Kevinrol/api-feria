              schema:
                $ref: "#/components/schemas/Criterio"
    delete:
      tags: [Criterio]
      summary: Eliminar criterio
      operationId: criterioRemove
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Criterio"

  /evaluacion:
    get:
      tags: [Evaluacion]
      summary: Listar evaluaciones
      operationId: evaluacionFindAll
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluacion"
    post:
      tags: [Evaluacion]
      summary: Crear evaluación (con detalles por criterio)
      operationId: evaluacionCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvaluacion"
      responses:
        "201":
          description: Recurso creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluacion"

  /evaluacion/{id}:
    get:
      tags: [Evaluacion]
      summary: Obtener evaluación por id
      operationId: evaluacionFindOne
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: object
                nullable: true
                allOf:
                  - $ref: "#/components/schemas/Evaluacion"
    patch:
      tags: [Evaluacion]
      summary: Actualizar evaluación (opcionalmente reemplazar detalles)
      operationId: evaluacionUpdate
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEvaluacion"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluacion"
    delete:
      tags: [Evaluacion]
      summary: Eliminar evaluación
      operationId: evaluacionRemove
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Evaluacion"

  /evaluacion/proyecto/{idProyecto}:
    get:
      tags: [Evaluacion]
      summary: Evaluaciones de un proyecto
      operationId: evaluacionByProyecto
      parameters:
        - name: idProyecto
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluacion"

  /evaluacion/jurado/{idJurado}:
    get:
      tags: [Evaluacion]
      summary: Evaluaciones de un jurado
      operationId: evaluacionByJurado
      parameters:
        - name: idJurado
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Evaluacion"

  /evaluacion/proyecto/{idProyecto}/promedio:
    get:
      tags: [Evaluacion]
      summary: Promedio de puntajes totales por evaluación del proyecto
      operationId: evaluacionPromedioProyecto
      parameters:
        - name: idProyecto
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Número (promedio)
          content:
            application/json:
              schema:
                type: number
                format: float

  /detalle-evaluacion:
    get:
      tags: [DetalleEvaluacion]
      summary: Listar detalles de evaluación
      operationId: detalleEvaluacionFindAll
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DetalleEvaluacion"
    post:
      tags: [DetalleEvaluacion]
      summary: Crear detalle (recalcula puntaje total de la evaluación)
      operationId: detalleEvaluacionCreate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDetalleEvaluacion"
      responses:
        "201":
          description: Recurso creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetalleEvaluacion"

  /detalle-evaluacion/evaluacion/{idEvaluacion}:
    get:
      tags: [DetalleEvaluacion]
      summary: Detalles por id de evaluación
      operationId: detalleEvaluacionByEvaluacion
      parameters:
        - name: idEvaluacion
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DetalleEvaluacion"

  /detalle-evaluacion/{id}:
    get:
      tags: [DetalleEvaluacion]
      summary: Obtener detalle por id
      operationId: detalleEvaluacionFindOne
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetalleEvaluacion"
        "404":
          description: No encontrado
    patch:
      tags: [DetalleEvaluacion]
      summary: Actualizar detalle (recalcula puntaje total)
      operationId: detalleEvaluacionUpdate
      parameters:
        - $ref: "#/components/parameters/PathId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDetalleEvaluacion"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetalleEvaluacion"
    delete:
      tags: [DetalleEvaluacion]
      summary: Eliminar detalle (recalcula puntaje total)
      operationId: detalleEvaluacionRemove
      parameters:
        - $ref: "#/components/parameters/PathId"
      responses:
        "200":
          description: Respuesta correcta
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetalleEvaluacion"

components:
  parameters:
    PathId:
      name: id
      in: path
      required: true
      description: Identificador numérico
      schema:
        type: integer

  schemas:
    Carrera:
      type: object
      properties:
        id_carrera:
          type: integer
        nombre_carrera:
          type: string
        codigo_carrera:
          type: string
        estudiantes:
          type: array
          items:
            $ref: "#/components/schemas/Estudiante"
        proyectos:
          type: array
          items:
            $ref: "#/components/schemas/Proyecto"

    CreateCarrera:
      type: object
      required: [nombre_carrera, codigo_carrera]
      properties:
        nombre_carrera:
          type: string
        codigo_carrera:
          type: string

    UpdateCarrera:
      type: object
      properties:
        nombre_carrera:
          type: string
        codigo_carrera:
          type: string

    Estudiante:
      type: object
      properties:
        id_estudiante:
          type: integer
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
          nullable: true
        correo:
          type: string
          nullable: true
        id_carrera:
          type: integer
        carrera:
          $ref: "#/components/schemas/Carrera"
        proyectos:
          type: array
          items:
            $ref: "#/components/schemas/ProyectoEstudiante"

    CreateEstudiante:
      type: object
      required: [ci, nombre, apellido, id_carrera]
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
        correo:
          type: string
        id_carrera:
          type: integer

    UpdateEstudiante:
      type: object
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
        correo:
          type: string
        id_carrera:
          type: integer

    Docente:
      type: object
      properties:
        id_docente:
          type: integer
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
          nullable: true
        correo:
          type: string
          nullable: true
        especialidad:
          type: string
          nullable: true
        proyectos:
          type: array
          items:
            $ref: "#/components/schemas/Proyecto"

    CreateDocente:
      type: object
      required: [ci, nombre, apellido]
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
        correo:
          type: string
        especialidad:
          type: string

    UpdateDocente:
      type: object
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        telefono:
          type: string
        correo:
          type: string
        especialidad:
          type: string

    Proyecto:
      type: object
      properties:
        id_proyecto:
          type: integer
        titulo:
          type: string
        descripcion:
          type: string
          nullable: true
        area_tematica:
          type: string
          nullable: true
        fecha_registro:
          type: string
          format: date
        id_docente:
          type: integer
        id_carrera:
          type: integer
        docente:
          $ref: "#/components/schemas/Docente"
        carrera:
          $ref: "#/components/schemas/Carrera"
        estudiantes:
          type: array
          items:
            $ref: "#/components/schemas/ProyectoEstudiante"
        evaluaciones:
          type: array
          items:
            $ref: "#/components/schemas/Evaluacion"

    CreateProyecto:
      type: object
      required: [titulo, fecha_registro, id_docente, id_carrera]
      properties:
        titulo:
          type: string
        descripcion:
          type: string
        area_tematica:
          type: string
        fecha_registro:
          type: string
          format: date
        id_docente:
          type: integer
        id_carrera:
          type: integer

    UpdateProyecto:
      type: object
      properties:
        titulo:
          type: string
        descripcion:
          type: string
        area_tematica:
          type: string
        fecha_registro:
          type: string
          format: date
        id_docente:
          type: integer
        id_carrera:
          type: integer

    ProyectoEstudiante:
      type: object
      properties:
        id_proyecto:
          type: integer
        id_estudiante:
          type: integer
        proyecto:
          $ref: "#/components/schemas/Proyecto"
        estudiante:
          $ref: "#/components/schemas/Estudiante"

    CreateProyectoEstudiante:
      type: object
      required: [id_proyecto, id_estudiante]
      properties:
        id_proyecto:
          type: integer
        id_estudiante:
          type: integer

    Jurado:
      type: object
      properties:
        id_jurado:
          type: integer
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        institucion:
          type: string
          nullable: true
        especialidad:
          type: string
          nullable: true
        telefono:
          type: string
          nullable: true
        correo:
          type: string
          nullable: true
        evaluaciones:
          type: array
          items:
            $ref: "#/components/schemas/Evaluacion"

    CreateJurado:
      type: object
      required: [ci, nombre, apellido]
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        institucion:
          type: string
        especialidad:
          type: string
        telefono:
          type: string
        correo:
          type: string

    UpdateJurado:
      type: object
      properties:
        ci:
          type: string
        nombre:
          type: string
        apellido:
          type: string
        institucion:
          type: string
        especialidad:
          type: string
        telefono:
          type: string
        correo:
          type: string

    Criterio:
      type: object
      properties:
        id_criterio:
          type: integer
        nombre_criterio:
          type: string
        descripcion:
          type: string
          nullable: true
        puntaje_maximo:
          type: number
          format: float

    CreateCriterio:
      type: object
      required: [nombre_criterio, puntaje_maximo]
      properties:
        nombre_criterio:
          type: string
        descripcion:
          type: string
        puntaje_maximo:
          type: number
          format: float

    UpdateCriterio:
      type: object
      properties:
        nombre_criterio:
          type: string
        descripcion:
          type: string
        puntaje_maximo:
          type: number
          format: float

    Evaluacion:
      type: object
      properties:
        id_evaluacion:
          type: integer
        id_jurado:
          type: integer
        id_proyecto:
          type: integer
        fecha_evaluacion:
          type: string
          format: date
        observaciones:
          type: string
          nullable: true
        puntaje_total:
          type: number
          format: float
          nullable: true
        jurado:
          $ref: "#/components/schemas/Jurado"
        proyecto:
          $ref: "#/components/schemas/Proyecto"
        detalles:
          type: array
          items:
            $ref: "#/components/schemas/DetalleEvaluacion"

    EvaluacionDetalleItem:
      type: object
      required: [id_criterio, puntaje_obtenido]
      properties:
        id_criterio:
          type: integer
        puntaje_obtenido:
          type: number
          format: float

    CreateEvaluacion:
      type: object
      required: [id_jurado, id_proyecto, fecha_evaluacion, detalles]
      properties:
        id_jurado:
          type: integer
        id_proyecto:
          type: integer
        fecha_evaluacion:
          type: string
          format: date
        observaciones:
          type: string
        detalles:
          type: array
          items:
            $ref: "#/components/schemas/EvaluacionDetalleItem"

    UpdateEvaluacion:
      type: object
      properties:
        id_jurado:
          type: integer
        id_proyecto:
          type: integer
        fecha_evaluacion:
          type: string
          format: date
        observaciones:
          type: string
        detalles:
          type: array
          items:
            $ref: "#/components/schemas/EvaluacionDetalleItem"

    DetalleEvaluacion:
      type: object
      properties:
        id_detalle:
          type: integer
        id_evaluacion:
          type: integer
        id_criterio:
          type: integer
        puntaje_obtenido:
          type: number
          format: float
        evaluacion:
          $ref: "#/components/schemas/Evaluacion"
        criterio:
          $ref: "#/components/schemas/Criterio"

    CreateDetalleEvaluacion:
      type: object
      required: [id_evaluacion, id_criterio, puntaje_obtenido]
      properties:
        id_evaluacion:
          type: integer
        id_criterio:
          type: integer
        puntaje_obtenido:
          type: number
          format: float

    UpdateDetalleEvaluacion:
      type: object
      properties:
        id_evaluacion:
          type: integer
        id_criterio:
          type: integer
        puntaje_obtenido:
          type: number
          format: float

    Usuario:
      type: object
      properties:
        id_usuario:
          type: integer
        correo:
          type: string
        rol:
          type: string
          enum: [ADMIN, JURADO, ESTUDIANTE, DOCENTE]
        id_estudiante:
          type: integer
          nullable: true
        id_docente:
          type: integer
          nullable: true
        id_jurado:
          type: integer
          nullable: true

    AuthLogin:
      type: object
      required: [correo, password]
      properties:
        correo:
          type: string
        password:
          type: string
          
    AuthToken:
      type: object
      properties:
        access_token:
          type: string
